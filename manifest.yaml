# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json

kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: image
  context: smoke-test # smoke-test folder
  dockerfile: ./build/Dockerfile

spec:
  operator: jobset
  image: image
  command: "python3 -u main.py --operator=jobset --sleep=30 --tb-write=True"

  tensorboard:
    enabled: true


  types:
    worker:
      count: 1
      resources:
        cpus: 4
        ramRatio: 4
        shmSizeGB: 0
        accelerators:
          gpu:
            product: nvidia-tesla-t4
            count: 1

