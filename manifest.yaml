kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: image
  dockerfile: ./build/ray.Dockerfile
  context: .

spec:
  operator: kuberay
  image: image
  command: "python3 -u main.py --operator=kuberay --sleep=600 --tb-write=True"

  # storage:
  #   attachExistingPVCs: # optional, array
  #     - name: "joao-gp2-45225e91fd8346df-joao-gp2-bc0a727ae0a3457f"
  #       mountPoint: "/mnt/my-60tib-dataset"

  gracefulTermination:
    shutdownCommand: ["/bin/sh", "-c", "curl -X 'GET' 'https://ms.dev.aichor.ai/1064-feat-test/api/v1/providers/kubernetes/ns/default/pods' -H 'accept: application/json'"]
    terminationGracePeriodSeconds: 100

  debug:
    jupyter: false

  tensorboard:
    enabled: true

  types:
    Head:
      resources:
        cpus: 1
        ramRatio: 2

    Workers:
      - name: cpu-workers
        count: 2
        resources:
          cpus: 1
          ramRatio: 2
          shmSizeGB: 0
