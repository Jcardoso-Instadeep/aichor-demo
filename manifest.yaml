kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: image
  dockerfile: ./build/ray.Dockerfile
  context: .

spec:
  operator: kuberay
  image: image
  command: "python3 -u main.py --operator=kuberay --sleep=300 --tb-write=True"

  storage:
    sharedVolume:
      mountPoint: "/mnt/shared"
      sizeGB: 16
      storageClass: longhorn-xfs
      accessMode: ReadWriteOnce
    attachExistingPVCs: # optional, array
      - name: "joao-pt2-pvc-81680a0349e34d1b-dsf-0a32fc8f5dc34438"
        mountPoint: "/mnt/my-60tib-dataset"

  debug:
    jupyter: false

  tensorboard:
    enabled: true

  types:
    Head:
      resources:
        cpus: 1
        ramRatio: 2

    Workers:
      - name: cpu-workers
        count: 1
        resources:
          cpus: 1
          ramRatio: 2
          shmSizeGB: 0
